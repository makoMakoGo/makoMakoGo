name: Latest blog post workflow
on:
  schedule:
    # Runs once a day at 00:00 UTC
    - cron: '0 0 * * *'
  # This line allows you to manually run the workflow from the Actions tab
  workflow_dispatch:


jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://zhu-jl18.github.io/atom.xml"
          max_post_count: 5
          # ✨ 全新的美化模板 ✨
          template: '<li><a href="$url" style="text-decoration: none; color: #0969da; font-weight: 600;">$title</a><span style="float: right; color: #57606a; font-size: 0.9em;">$date</span></li>'
          date_format: "yyyy-mm-dd" # 统一日期格式
          disable_html_encoding: true # 允许使用我们自定义的HTML


